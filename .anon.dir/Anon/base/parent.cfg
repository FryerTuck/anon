RewriteEngine on
RewriteBase /

RewriteCond %{HTTP_HOST} ([a-z0-9]+)\.
RewriteRule ^(.*)$ - [E=BASE:%1]

RewriteCond %{DOCUMENT_ROOT}/%{ENV:BASE}/.anon.php -f
RewriteRule ^(.*)$ %{ENV:BASE}/.anon.php [L,QSA]

RewriteCond %{DOCUMENT_ROOT}/.anon.php -f
RewriteRule ^(.*)$ .anon.php [L,QSA]


RewriteCond %{REQUEST_FILENAME} ([^\/]+$)
RewriteRule ^(.*)$ - [E=LEAF:%1]

RewriteCond %{DOCUMENT_ROOT}/%{ENV:BASE}/%{ENV:LEAF} -f
RewriteRule ^(.*)$ %{ENV:BASE}/%{ENV:LEAF} [L,QSA]

RewriteCond %{DOCUMENT_ROOT}/%{ENV:BASE}/%{ENV:LEAF} -d
RewriteCond %{DOCUMENT_ROOT}/%{ENV:BASE}/%{ENV:LEAF}/index.php -f
RewriteRule ^(.*)$ %{ENV:BASE}/%{ENV:LEAF}/index.php [L,QSA]

RewriteCond %{DOCUMENT_ROOT}/%{ENV:BASE}/%{ENV:LEAF} -d
RewriteCond %{DOCUMENT_ROOT}/%{ENV:BASE}/%{ENV:LEAF}/index.html -f
RewriteRule ^(.*)$ %{ENV:BASE}/%{ENV:LEAF}/index.html [L,QSA]
