<!DOCTYPE html>
<html>
    <head>
        <title>{:appTitle:}</title>

        <meta name="description" content="{:appMotto:}" />
        <meta name="keywords" content="{:appWords:}" />

        <meta property="og:title" content="{:appTitle:}" />
        <meta property="og:site_name" content="{:HOSTNAME:}" />
        <meta property="og:url" content="https://{:HOSTNAME:}/" />
        <meta property="og:description" content="{:appMotto:}" />
        <meta property="og:type" content="website">
        <meta property="og:image" content="https://{:HOSTNAME:}{:appImage:}" />

        <meta name="generator" content="Anon" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <style>
            html,body{position:relative; height:100%; overflow:hidden; padding:0px; margin:0px; background:hsla(210,3%,16%,1); font-family: Arial, Helvetica, sans-serif; font-size:14px; line-height:16px; color:#AAA;}
            #snth{display:inline-block; position:absolute; width:320px; height:240px; top:-9500px; left:-9500px; overflow:hidden;}
            iframe{display:block; width:100%; height:100%; border:none; background:transparent; margin:0px; padding:0px;}
        </style>

        <script src="{:durl('$/Site/base/aard.js'):}"></script>
    </head>
    <body>
        <div id="snth">
            <h1>{:appTitle:}</h1>
            <p>{:appMotto:}</p>
            <img id="AnonGate" data-src="data:image/jpeg;base64,{:encode::b64('$/Site/base/prep.js'):}" />
            <form action="{:botHoney:}" method="POST" rel="nofollow">
                <input type="text" name="age"/><input type="submit" value="ok" />
                <noscript id="nojs"><meta http-equiv="refresh" content="1; URL={:DBUGPATH:}" /></noscript>
            </form>
            <a href="{:botHoney:}?welcome=yes" rel="nofollow">contacts</a>
            <!-- that daring look on your face is justified ;) -->
        </div>
    </body>
</html>
